services:
  backend:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "${EXTERNAL_PORT}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Server/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
